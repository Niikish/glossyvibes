<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coupon Redemption Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        #response {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f8f8;
            border: 1px solid #ddd;
            border-radius: 4px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>Coupon Redemption Test</h1>
    
    <div class="form-group">
        <label for="couponCode">Coupon Code:</label>
        <input type="text" id="couponCode" value="WELCOME10">
    </div>
    
    <button id="testBtn">Test Redemption</button>
    
    <div id="response"></div>
    
    <script>
        document.getElementById('testBtn').addEventListener('click', async function() {
            const couponCode = document.getElementById('couponCode').value;
            const responseDiv = document.getElementById('response');
            
            responseDiv.textContent = 'Sending request...';
            
            try {
                // Get an authentication token first - this assumes you have a login endpoint
                const loginResponse = await fetch('/api/v1/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'admin@example.com',  // Replace with actual admin credentials
                        password: 'password123'
                    })
                });
                
                const loginData = await loginResponse.json();
                if (!loginData.success) {
                    throw new Error('Login failed: ' + (loginData.message || 'Unknown error'));
                }
                
                // Now redeem the coupon
                const redeemResponse = await fetch('/api/v1/coupon/redeem', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        code: couponCode
                    })
                });
                
                const data = await redeemResponse.json();
                responseDiv.textContent = JSON.stringify(data, null, 2);
                
                if (data.success) {
                    alert('Coupon redeemed successfully! New usage count: ' + data.usageCount);
                } else {
                    alert('Error: ' + data.message);
                }
                
            } catch (error) {
                responseDiv.textContent = 'Error: ' + error.message;
                console.error('Error:', error);
            }
        });
    </script>
</body>
</html>
